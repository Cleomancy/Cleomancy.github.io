<!DOCTYPE html>
<!-- How much -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/webp" href="./static/logo.webp">
  <meta name="description" content="The vulture watches as war glints on the horizon, And the dove cracks and lolls between the teeth of oblivion. The oak blossoms during Spring.">
  <meta name="keywords" content="oak, vulture, dove, cleomancy, github, single page site, demo, github.io">
  
<style>

::-webkit-scrollbar {
  display: none;
}

@keyframes flicker {
    0% { opacity: 0.15795 }
    5% { opacity: 0.31511 }
    10% { opacity: 0.94554 }
    15% { opacity: 0.2469 }
    20% { opacity: 0.62031 }
    25% { opacity: 0.0293 }
    30% { opacity: 0.00899 }
    35% { opacity: 0.5344 }
    40% { opacity: 0.12778 }
    45% { opacity: 0.52042 }
    50% { opacity: 0.3823 }
    55% { opacity: 0.2198 }
    60% { opacity: 0.9383 }
    65% { opacity: 0.86615 }
    70% { opacity: 0.68695 }
    75% { opacity: 0.55749 }
    80% { opacity: 0.96984 }
    85% { opacity: 0.0361 }
    90% { opacity: 0.24467 }
    95% { opacity: 0.08351 }
    100% { opacity: 0.54813 }
  }

html{
  background-image: url("./static/rectangle.gif");
  color: #999;
  overflow: hidden;
}
.overlay:before {
  background: linear-gradient(#101010 50%, rgba(16, 16, 16, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.03));
  background-size: 100% 4px, 6px 100%;
  content: "";
  display: block;
  pointer-events: none;
  position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
  z-index: 2;
}
  
.overlay:after {
  animation: flicker 0.30s infinite;
  background: rgba(16, 16, 16, 0.2);
  content: "";
  display: block;
  pointer-events: none;
  position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
  z-index: 2;
}

.wrapper {
  animation: scroll 5s 1;
  margin: 0;
  overflow: hidden;
  padding: 0;
    scrollbar-width: none;
  -ms-overflow-style: none;
}

div {
    position: relative;
    width: 20%;
    height: 20%;
}
img {
    position: absolute;
    top: 0;
    bottom: 0;
    right:0;
    left:0;
    margin: auto;
    width:52vw;
    height:auto;

}

</style>

<title>CLEOMANCY | The Github.io Page</title>
</head>
<body>
  <div class="overlay"></div>
    <a href="https://cleomancy.com/"><img src="./static/logo.webp"></a>
</body>
</html>
